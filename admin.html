<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Corte & Arte</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5EFE6;
    --dark: #1A1410;
    --gold: #C9963A;
    --warm-gray: #8C7B6B;
    --orange: #D4682A;
    --light-bg: #FAF7F2;
    --success: #4CAF50;
    --error: #e53935;
    --pending: #FF9800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--cream); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(107,63,31,.3) 0%, transparent 70%);
  }
  .login-box {
    background: rgba(245,239,230,.04); border: 1px solid rgba(201,150,58,.2);
    border-radius: 4px; padding: 3rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 1.2rem;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--cream); text-align: center; }
  .login-logo span { color: var(--gold); font-style: italic; }
  .login-label { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: .4rem; }
  .login-input {
    width: 100%; background: rgba(245,239,230,.04); border: 1px solid rgba(201,150,58,.2);
    border-radius: 2px; padding: .85rem 1rem; color: var(--cream);
    font-family: 'Barlow', sans-serif; font-size: .95rem; outline: none; transition: border-color .25s;
  }
  .login-input:focus { border-color: var(--gold); }
  .login-btn {
    background: var(--gold); color: var(--dark); border: 2px solid var(--gold);
    padding: .9rem; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem;
    letter-spacing: .25em; text-transform: uppercase; font-weight: 700;
    cursor: pointer; border-radius: 2px; transition: all .25s; margin-top: .5rem;
  }
  .login-btn:hover { background: transparent; color: var(--gold); }
  .login-error { color: #ef9a9a; font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; text-align: center; display: none; }

  /* ── PAINEL ── */
  #painel { display: none; min-height: 100vh; }

  header {
    background: rgba(26,20,16,.95); border-bottom: 1px solid rgba(201,150,58,.15);
    padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .header-logo span { color: var(--gold); font-style: italic; }
  .header-badge {
    font-family: 'Barlow Condensed', sans-serif; font-size: .75rem;
    letter-spacing: .2em; text-transform: uppercase; color: var(--warm-gray);
  }
  .logout-btn {
    font-family: 'Barlow Condensed', sans-serif; font-size: .75rem;
    letter-spacing: .15em; text-transform: uppercase; color: var(--warm-gray);
    background: none; border: 1px solid rgba(255,255,255,.1); padding: .4rem 1rem;
    cursor: pointer; border-radius: 2px; transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

  .painel-body { padding: 2.5rem; max-width: 1100px; margin: 0 auto; }

  /* ── NAVEGAÇÃO DO MÊS ── */
  .mes-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .mes-titulo { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
  .mes-titulo span { color: var(--gold); }
  .mes-btns { display: flex; gap: .5rem; }
  .mes-btn {
    background: rgba(245,239,230,.05); border: 1px solid rgba(201,150,58,.2);
    color: var(--cream); padding: .5rem 1.2rem; cursor: pointer; border-radius: 2px;
    font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .1em;
    transition: all .2s;
  }
  .mes-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── STATS ── */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2.5rem; }
  .stat-card {
    background: rgba(245,239,230,.04); border: 1px solid rgba(201,150,58,.15);
    border-radius: 3px; padding: 1.2rem 1.5rem;
  }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); font-weight: 700; line-height: 1; }
  .stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .2em; text-transform: uppercase; color: var(--warm-gray); margin-top: .3rem; }

  /* ── CALENDÁRIO ── */
  .calendario { background: rgba(245,239,230,.03); border: 1px solid rgba(201,150,58,.12); border-radius: 3px; overflow: hidden; margin-bottom: 2.5rem; }
  .cal-header {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid rgba(201,150,58,.12);
  }
  .cal-dow {
    padding: .7rem; text-align: center; font-family: 'Barlow Condensed', sans-serif;
    font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: var(--warm-gray);
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day {
    min-height: 80px; padding: .5rem; border-right: 1px solid rgba(201,150,58,.08);
    border-bottom: 1px solid rgba(201,150,58,.08); cursor: pointer; transition: background .2s;
    position: relative;
  }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day:hover:not(.vazio) { background: rgba(201,150,58,.07); }
  .cal-day.selecionado { background: rgba(201,150,58,.12); border-color: rgba(201,150,58,.3); }
  .cal-day.vazio { cursor: default; background: rgba(0,0,0,.15); }
  .cal-day.hoje .cal-num { background: var(--gold); color: var(--dark); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .cal-num { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 600; color: rgba(245,239,230,.6); margin-bottom: .3rem; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .cal-ponto { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin: 1px; }
  .cal-ponto.pendente { background: var(--pending); }
  .cal-ponto.confirmado { background: var(--success); }
  .cal-ponto.cancelado { background: rgba(255,255,255,.2); }
  .cal-count { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; color: var(--gold); }

  /* ── LISTA DO DIA ── */
  .dia-titulo {
    font-family: 'Barlow Condensed', sans-serif; font-size: .75rem;
    letter-spacing: .3em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 1rem;
  }
  .agendamento-card {
    background: rgba(245,239,230,.04); border: 1px solid rgba(201,150,58,.12);
    border-radius: 3px; padding: 1.2rem 1.5rem; margin-bottom: .8rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    transition: border-color .2s;
  }
  .agendamento-card:hover { border-color: rgba(201,150,58,.3); }
  .agendamento-card.cancelado { opacity: .4; }
  .ag-horario {
    font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold);
    font-weight: 700; min-width: 60px;
  }
  .ag-info { flex: 1; }
  .ag-nome { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: .05em; }
  .ag-detalhe { font-size: .82rem; color: var(--warm-gray); margin-top: .2rem; }
  .ag-tel { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; color: rgba(245,239,230,.4); margin-top: .15rem; }
  .ag-status {
    font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; letter-spacing: .15em;
    text-transform: uppercase; padding: .25rem .7rem; border-radius: 20px;
  }
  .ag-status.pendente { background: rgba(255,152,0,.15); color: var(--pending); border: 1px solid rgba(255,152,0,.3); }
  .ag-status.confirmado { background: rgba(76,175,80,.15); color: #81c784; border: 1px solid rgba(76,175,80,.3); }
  .ag-status.cancelado { background: rgba(255,255,255,.05); color: rgba(245,239,230,.3); border: 1px solid rgba(255,255,255,.1); }
  .ag-actions { display: flex; gap: .5rem; }
  .ag-btn {
    font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .1em;
    text-transform: uppercase; padding: .45rem .9rem; border-radius: 2px; cursor: pointer;
    transition: all .2s; border: 1px solid;
  }
  .ag-btn.confirmar { border-color: rgba(76,175,80,.4); color: #81c784; background: rgba(76,175,80,.08); }
  .ag-btn.confirmar:hover { background: rgba(76,175,80,.2); }
  .ag-btn.cancelar { border-color: rgba(229,57,53,.4); color: #ef9a9a; background: rgba(229,57,53,.08); }
  .ag-btn.cancelar:hover { background: rgba(229,57,53,.2); }
  .ag-btn:disabled { opacity: .3; cursor: not-allowed; }

  .dia-vazio { font-family: 'Barlow Condensed', sans-serif; color: var(--warm-gray); font-size: .9rem; letter-spacing: .1em; padding: 1.5rem 0; text-align: center; }
  .loading { text-align: center; padding: 3rem; color: var(--warm-gray); font-family: 'Barlow Condensed', sans-serif; letter-spacing: .15em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Corte <span>&amp; Arte</span></div>
    <div>
      <label class="login-label">Senha do painel</label>
      <input type="password" class="login-input" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
    </div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta.</div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">
  <header>
    <div>
      <div class="header-logo">Corte <span>&amp; Arte</span></div>
      <div class="header-badge">Painel do Barbeiro</div>
    </div>
    <button class="logout-btn" onclick="sair()">Sair</button>
  </header>

  <div class="painel-body">

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Agendamentos no mês</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-hoje">—</div>
        <div class="stat-label">Agendamentos hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-pendentes">—</div>
        <div class="stat-label">Pendentes</div>
      </div>
    </div>

    <!-- NAVEGAÇÃO DO MÊS -->
    <div class="mes-nav">
      <h2 class="mes-titulo" id="mes-titulo">— <span>—</span></h2>
      <div class="mes-btns">
        <button class="mes-btn" onclick="mudarMes(-1)">← Anterior</button>
        <button class="mes-btn" onclick="mudarMes(0)">Hoje</button>
        <button class="mes-btn" onclick="mudarMes(1)">Próximo →</button>
      </div>
    </div>

    <!-- CALENDÁRIO -->
    <div class="calendario">
      <div class="cal-header">
        <div class="cal-dow">Dom</div><div class="cal-dow">Seg</div>
        <div class="cal-dow">Ter</div><div class="cal-dow">Qua</div>
        <div class="cal-dow">Qui</div><div class="cal-dow">Sex</div>
        <div class="cal-dow">Sáb</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- LISTA DO DIA SELECIONADO -->
    <div id="lista-dia">
      <div class="dia-vazio">Clique em um dia para ver os agendamentos.</div>
    </div>

  </div>
</div>

<script>
  const API_BASE = '/api';
  let adminKey = '';
  let agendamentos = [];
  let dataAtual = new Date();
  let diaSelecionado = null;

  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // ── LOGIN ──
  async function fazerLogin() {
    const senha = document.getElementById('senha-input').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    // Testa a senha chamando a API
    try {
      const res = await fetch(`${API_BASE}/admin?mes=${dataAtual.getMonth()+1}&ano=${dataAtual.getFullYear()}`, {
        headers: { 'x-admin-key': senha }
      });

      if (res.status === 401) {
        errEl.style.display = 'block';
        return;
      }

      adminKey = senha;
      const json = await res.json();
      agendamentos = json.agendamentos || [];

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
      renderizarTudo();

    } catch(e) {
      errEl.textContent = 'Erro de conexão.';
      errEl.style.display = 'block';
    }
  }

  function sair() {
    adminKey = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('senha-input').value = '';
  }

  // ── CARREGAR AGENDAMENTOS ──
  async function carregarAgendamentos() {
    const mes = dataAtual.getMonth() + 1;
    const ano = dataAtual.getFullYear();
    const res = await fetch(`${API_BASE}/admin?mes=${mes}&ano=${ano}`, {
      headers: { 'x-admin-key': adminKey }
    });
    const json = await res.json();
    agendamentos = json.agendamentos || [];
  }

  // ── RENDERIZAR TUDO ──
  function renderizarTudo() {
    const mes = dataAtual.getMonth();
    const ano = dataAtual.getFullYear();

    // Título
    document.getElementById('mes-titulo').innerHTML = `${MESES[mes]} <span>${ano}</span>`;

    // Stats
    const hoje = new Date().toISOString().split('T')[0];
    const doMes = agendamentos.filter(a => a.status !== 'cancelado');
    const deHoje = agendamentos.filter(a => a.data === hoje && a.status !== 'cancelado');
    const pendentes = agendamentos.filter(a => a.status === 'pendente');
    document.getElementById('stat-total').textContent = doMes.length;
    document.getElementById('stat-hoje').textContent = deHoje.length;
    document.getElementById('stat-pendentes').textContent = pendentes.length;

    // Calendário
    renderizarCalendario(mes, ano);

    // Lista do dia selecionado
    if (diaSelecionado) renderizarDia(diaSelecionado);
  }

  function renderizarCalendario(mes, ano) {
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    const primeiroDia = new Date(ano, mes, 1).getDay();
    const diasNoMes = new Date(ano, mes + 1, 0).getDate();
    const hoje = new Date().toISOString().split('T')[0];

    // Vazios antes
    for (let i = 0; i < primeiroDia; i++) {
      const vazio = document.createElement('div');
      vazio.className = 'cal-day vazio';
      grid.appendChild(vazio);
    }

    for (let d = 1; d <= diasNoMes; d++) {
      const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dosDia = agendamentos.filter(a => a.data === dataStr);
      const isHoje = dataStr === hoje;
      const isSel  = dataStr === diaSelecionado;

      const div = document.createElement('div');
      div.className = 'cal-day' + (isHoje ? ' hoje' : '') + (isSel ? ' selecionado' : '');
      div.onclick = () => selecionarDia(dataStr);

      const num = document.createElement('div');
      num.className = 'cal-num';
      num.textContent = d;
      div.appendChild(num);

      if (dosDia.length > 0) {
        const pontos = document.createElement('div');
        dosDia.slice(0, 6).forEach(a => {
          const p = document.createElement('span');
          p.className = `cal-ponto ${a.status}`;
          pontos.appendChild(p);
        });
        div.appendChild(pontos);

        const count = document.createElement('div');
        count.className = 'cal-count';
        count.textContent = dosDia.filter(a => a.status !== 'cancelado').length + ' agend.';
        div.appendChild(count);
      }

      grid.appendChild(div);
    }
  }

  function selecionarDia(dataStr) {
    diaSelecionado = dataStr;
    renderizarCalendario(dataAtual.getMonth(), dataAtual.getFullYear());
    renderizarDia(dataStr);
  }

  function renderizarDia(dataStr) {
    const [ano, mes, dia] = dataStr.split('-');
    const dosDia = agendamentos.filter(a => a.data === dataStr);
    const container = document.getElementById('lista-dia');

    const label = `${dia}/${mes}/${ano}`;
    let html = `<div class="dia-titulo">Agendamentos — ${label}</div>`;

    if (dosDia.length === 0) {
      html += `<div class="dia-vazio">Nenhum agendamento neste dia.</div>`;
    } else {
      dosDia.forEach(a => {
        const horario = a.horario.slice(0,5);
        const cancelado = a.status === 'cancelado';
        html += `
          <div class="agendamento-card ${a.status}" id="card-${a.id}">
            <div class="ag-horario">${horario}</div>
            <div class="ag-info">
              <div class="ag-nome">${a.nome}</div>
              <div class="ag-detalhe">${a.servico}</div>
              <div class="ag-tel">${a.telefone}</div>
            </div>
            <span class="ag-status ${a.status}">${a.status}</span>
            <div class="ag-actions">
              ${!cancelado ? `
                <button class="ag-btn confirmar" onclick="atualizarStatus('${a.id}', 'confirmado')">✓ Confirmar</button>
                <button class="ag-btn cancelar" onclick="atualizarStatus('${a.id}', 'cancelado')">✕ Cancelar</button>
              ` : ''}
            </div>
          </div>`;
      });
    }

    container.innerHTML = html;
  }

  async function atualizarStatus(id, novoStatus) {
    const res = await fetch(`${API_BASE}/admin`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ id, status: novoStatus })
    });

    if (res.ok) {
      // Atualiza localmente
      const ag = agendamentos.find(a => a.id === id);
      if (ag) ag.status = novoStatus;
      renderizarTudo();
    }
  }

  async function mudarMes(delta) {
    if (delta === 0) {
      dataAtual = new Date();
    } else {
      dataAtual.setMonth(dataAtual.getMonth() + delta);
    }
    await carregarAgendamentos();
    diaSelecionado = null;
    document.getElementById('lista-dia').innerHTML = '<div class="dia-vazio">Clique em um dia para ver os agendamentos.</div>';
    renderizarTudo();
  }
</script>
</body>
</html>
